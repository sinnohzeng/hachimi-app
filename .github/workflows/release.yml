# ---
# CI/CD: Build release APK + AAB, publish GitHub Release, and upload to Google Play.
#
# Trigger: push tag matching 'v*' (e.g. v2.28.0)
# Output:
#   - GitHub Release with hachimi-vX.Y.Z.apk attached (+ Sigstore provenance)
#   - AAB uploaded to Google Play production track (100% rollout)
#
# Required secrets (scoped to 'production' environment):
#   KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD,
#   GOOGLE_SERVICES_JSON, FIREBASE_OPTIONS_DART,
#   WIF_PROVIDER, WIF_SERVICE_ACCOUNT
#
# Supply-chain hardening:
#   - All actions pinned to commit SHA (Dependabot keeps them fresh)
#   - Top-level permissions: {} (deny-by-default)
#   - Job scoped to 'production' environment (secrets isolated, tag-only deploy)
#   - APK provenance attestation via Sigstore
# ---

name: Build & Release

on:
  push:
    tags:
      - 'v*'

# Deny-by-default — each job explicitly grants only what it needs
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write       # GitHub Release + upload assets
      id-token: write       # WIF OIDC token request
      attestations: write   # Sigstore build provenance

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2.22.0
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Set up Node 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Validate release secrets
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
        run: ./tool/check_release_secrets.sh

      # Restore gitignored Firebase config files from secrets
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Decode firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart

      # Restore signing keystore and credentials
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/hachimi-release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=${{ github.workspace }}/android/app/hachimi-release.jks
          EOF

      # Accept Android SDK licenses
      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses

      - name: Get dependencies
        run: flutter pub get

      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          if [ "$TAG_VERSION" != "$PUBSPEC_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != pubspec version ($PUBSPEC_VERSION)"
            exit 1
          fi

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/ test/

      - name: Check for placeholders
        run: |
          ! rg -n "TODO|FIXME|TBD|占位" lib test functions/src functions/test .claude/memory

      - name: Validate whatsnew files
        run: |
          for f in distribution/whatsnew/whatsnew-*; do
            if head -1 "$f" | grep -qi "Welcome to Hachimi\|欢迎来到\|ようこそ\|환영합니다"; then
              echo "::error::$f contains generic app description. Update with version-specific notes."
              exit 1
            fi
          done
          required="en-US zh-CN zh-TW ja-JP ko-KR es-ES pt-BR fr-FR de-DE it-IT hi-IN th vi id tr-TR"
          for locale in $required; do
            if [ ! -f "distribution/whatsnew/whatsnew-$locale" ]; then
              echo "::error::Missing whatsnew file for $locale"
              exit 1
            fi
          done

      - name: Check l10n completeness
        run: dart run tool/l10n_check.dart

      - name: Quality gate
        run: dart run tool/quality_gate.dart

      - name: Static analysis
        run: dart analyze lib test

      - name: Run tests
        run: flutter test --exclude-tags golden

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Run Functions tests
        run: npm test
        working-directory: functions

      # Build AAB for Google Play (before APK — fail fast on Play Store deliverable)
      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Build release APK
        run: flutter build apk --release

      - name: Report build sizes
        run: |
          APK="build/app/outputs/flutter-apk/app-release.apk"
          AAB="build/app/outputs/bundle/release/app-release.aab"
          APK_SIZE=$(stat --format="%s" "$APK")
          APK_MB=$(echo "scale=2; $APK_SIZE / 1048576" | bc)
          AAB_SIZE=$(stat --format="%s" "$AAB")
          AAB_MB=$(echo "scale=2; $AAB_SIZE / 1048576" | bc)
          echo "### Build Sizes" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK | **${APK_MB} MB** (\`${APK_SIZE}\` bytes) |" >> $GITHUB_STEP_SUMMARY
          echo "| AAB | **${AAB_MB} MB** (\`${AAB_SIZE}\` bytes) |" >> $GITHUB_STEP_SUMMARY
        env:
          GRADLE_OPTS: "-Xmx4G -XX:MaxMetaspaceSize=2G"

      # Authenticate to Google Cloud via Workload Identity Federation (keyless)
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # Upload AAB to Google Play production track (100% rollout)
      - name: Upload to Google Play
        id: play_upload
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb # v1.1.3
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: com.hachimi.hachimi_app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          whatsNewDirectory: distribution/whatsnew
          mappingFile: build/app/outputs/mapping/release/mapping.txt

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/hachimi-v${{ steps.version.outputs.version }}.apk

      - name: Attest APK provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: build/app/outputs/flutter-apk/hachimi-v${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: build/app/outputs/flutter-apk/hachimi-v${{ steps.version.outputs.version }}.apk
          name: Hachimi v${{ steps.version.outputs.version }}
          body_path: distribution/whatsnew/whatsnew-en-US
          generate_release_notes: true
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | **v${{ steps.version.outputs.version }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Google Play | production (completed) |" >> $GITHUB_STEP_SUMMARY
          echo "| Provenance | [Attestation](https://github.com/${{ github.repository }}/attestations) |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | [View](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What's New (en-US)" >> $GITHUB_STEP_SUMMARY
          cat distribution/whatsnew/whatsnew-en-US >> $GITHUB_STEP_SUMMARY
