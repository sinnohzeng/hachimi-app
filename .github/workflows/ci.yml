name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    env:
      CI_FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@1508160852fb97248640997f7cfb38da241df0ba # v2.9.1
        with:
          flutter-version: '3.41.1'
          channel: stable
          cache: true

      - name: Set up Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Restore firebase_options.dart from secret (if available)
        if: ${{ env.CI_FIREBASE_OPTIONS_DART != '' }}
        run: echo "$CI_FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart

      - name: Generate firebase_options.dart fallback for CI (no secret)
        if: ${{ env.CI_FIREBASE_OPTIONS_DART == '' }}
        run: |
          cat > lib/firebase_options.dart <<'EOF'
          import 'package:firebase_core/firebase_core.dart';
          import 'package:flutter/foundation.dart'
              show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              if (kIsWeb) return _web;
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return _android;
                case TargetPlatform.iOS:
                  return _ios;
                case TargetPlatform.macOS:
                  return _macos;
                case TargetPlatform.windows:
                  return _windows;
                case TargetPlatform.linux:
                  return _linux;
                default:
                  return _android;
              }
            }

            static const FirebaseOptions _android = FirebaseOptions(
              apiKey: 'ci-placeholder',
              appId: '1:000000000000:android:ci',
              messagingSenderId: '000000000000',
              projectId: 'ci-placeholder',
            );

            static const FirebaseOptions _ios = FirebaseOptions(
              apiKey: 'ci-placeholder',
              appId: '1:000000000000:ios:ci',
              messagingSenderId: '000000000000',
              projectId: 'ci-placeholder',
              iosBundleId: 'com.example.ci',
            );

            static const FirebaseOptions _macos = FirebaseOptions(
              apiKey: 'ci-placeholder',
              appId: '1:000000000000:ios:ci',
              messagingSenderId: '000000000000',
              projectId: 'ci-placeholder',
              iosBundleId: 'com.example.ci',
            );

            static const FirebaseOptions _windows = FirebaseOptions(
              apiKey: 'ci-placeholder',
              appId: '1:000000000000:web:ci',
              messagingSenderId: '000000000000',
              projectId: 'ci-placeholder',
              authDomain: 'ci-placeholder.firebaseapp.com',
              storageBucket: 'ci-placeholder.appspot.com',
              measurementId: 'G-CI00000000',
            );

            static const FirebaseOptions _linux = FirebaseOptions(
              apiKey: 'ci-placeholder',
              appId: '1:000000000000:web:ci',
              messagingSenderId: '000000000000',
              projectId: 'ci-placeholder',
              authDomain: 'ci-placeholder.firebaseapp.com',
              storageBucket: 'ci-placeholder.appspot.com',
              measurementId: 'G-CI00000000',
            );

            static const FirebaseOptions _web = FirebaseOptions(
              apiKey: 'ci-placeholder',
              appId: '1:000000000000:web:ci',
              messagingSenderId: '000000000000',
              projectId: 'ci-placeholder',
              authDomain: 'ci-placeholder.firebaseapp.com',
              storageBucket: 'ci-placeholder.appspot.com',
              measurementId: 'G-CI00000000',
            );
          }
          EOF

      - name: Check for placeholders
        run: |
          ! rg -n "TODO|FIXME|TBD|占位" lib test functions/src functions/test .claude/memory

      - name: Analyze Dart
        run: dart analyze lib test

      - name: Dart quality gate
        run: dart run tool/quality_gate.dart

      - name: Run Flutter tests
        run: flutter test --exclude-tags golden

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Run Functions tests
        run: npm test
        working-directory: functions
